openapi: 3.0.3
info:
  title: OneF Integration API
  description: Internal API for OneF (1F) ERP to communicate with the Recruitment Platform.
  version: 1.2.0
servers:
  - url: http://192.168.1.47/app/v1.2/api/publications
    description: OneF Internal Server
  - url: http://10.10.10.25:8888/app/v1.2/api/publications
    description: OneF External/VPN Server

paths:
  /dashboard:
    get:
      summary: Get Dashboard Stats
      description: Retrieves high-level recruitment metrics and funnel data.
      tags:
        - Dashboard
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneFDashboardStats'

  /candidates:
    get:
      summary: List Candidates
      description: Retrieves a list of all registered candidates.
      tags:
        - Candidates
      responses:
        '200':
          description: Array of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OneFCandidateResponse'

  /candidates/{id}:
    get:
      summary: Get Candidate Details
      description: Retrieves full profile information for a specific candidate.
      tags:
        - Candidates
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Candidate details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneFCandidateResponse'
        '404':
          description: Candidate not found

  /candidates/{id}/status:
    post:
      summary: Update Candidate Status
      description: Updates the recruitment status for a specific candidate.
      tags:
        - Candidates
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneFUpdateStatusRequest'
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  updated_at:
                    type: string
                    format: date-time

  /candidates/{id}/analyze:
    post:
      summary: Analyze Candidate Suitability
      description: Triggers a manual AI suitability analysis for the candidate.
      tags:
        - Candidates
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Analysis successful
        '404':
          description: Candidate not found

  /candidates/{id}/attempts:
    get:
      summary: Get Candidate Test Attempts
      description: Lists all test attempts for a specific candidate.
      tags:
        - Candidates
        - Tests
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OneFAttempt' # Attempt object
                  total:
                    type: integer

  /messages:
    post:
      summary: Send Message to Candidate
      description: Sends a message to a candidate via the Telegram Bot.
      tags:
        - Messaging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneFSendMessageRequest'
      responses:
        '200':
          description: Message sent successfully
        '400':
          description: Candidate has no linked Telegram account
        '404':
          description: Candidate not found
        '500':
          description: Telegram API failure

  /messages/{candidate_id}:
    get:
      summary: Get Chat History
      description: Returns chat history for a candidate. Automatically marks inbound messages as read.
      tags:
        - Messaging
      parameters:
        - in: path
          name: candidate_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chat history array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OneFChatMessage'

  /messages/unread:
    get:
      summary: Get Global Unread Messages Count
      tags:
        - Messaging
      responses:
        '200':
          description: Unread message count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread_count:
                    type: integer

  /tests:
    get:
      summary: List Active Tests
      description: Lists all active tests available for assignments.
      tags:
        - Tests
      responses:
        '200':
          description: List of tests
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OneFTestSummary'
                  total:
                    type: integer

  /invites:
    post:
      summary: Create Test Invite
      description: Generates a new test attempt/link for a candidate and notifies them via Telegram.
      tags:
        - Tests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneFCreateInviteRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempt_id:
                    type: string
                    format: uuid
                  access_token:
                    type: string
                  test_url:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                  status:
                    type: string
                  candidate_name:
                    type: string
                  test_title:
                    type: string

    OneFAttempt:
      type: object
      properties:
        id:
          type: string
          format: uuid
        test_id:
          type: string
          format: uuid
        candidate_name:
          type: string
        candidate_email:
          type: string
        status:
          type: string
        score:
          type: number
          nullable: true
        max_score:
          type: number
          nullable: true
        percentage:
          type: number
          nullable: true
        passed:
          type: boolean
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        time_spent_seconds:
          type: integer
          nullable: true
        result_url:
          type: string
          nullable: true
          description: "URL to the test result report (TXT for simple tests or combined link/file for presentations)"

  /attempts_filter:
    get:
      summary: Filter Test Attempts
      description: Filterable and paginated list of all test attempts.
      tags:
        - Tests
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: email
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Paginated attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/OneFAttempt'
                  total:
                    type: integer
                  page:
                    type: integer
                  limit:
                    type: integer

  /attempts:
    get:
      summary: List All Test Attempts
      description: Returns a raw, unpaginated (or large limit) list of all attempts without filters.
      tags:
        - Tests
      responses:
        '200':
          description: List of all attempt objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

  /attempts/{id}:
    get:
      summary: Get Attempt Details
      description: Retrieves detailed results for a specific attempt, including answers.
      tags:
        - Tests
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detailed attempt data
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempt:
                    $ref: '#/components/schemas/OneFAttempt'
                  test_title:
                    type: string
                  test_type:
                    type: string

  /vacancies:
    get:
      summary: List Published Vacancies
      description: Lists active internal and external (Koinoti Nav) vacancies.
      tags:
        - Vacancies
      responses:
        '200':
          description: Array of vacancies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OneFVacancyResponse'
  /vacancies/external:
    post:
      summary: Create External Vacancy (Triggers Selenium Script)
      description: Launches Python Selenium to create a vacancy in job.koinotinav.tj.
      tags:
        - Vacancies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneFExternalVacancyPayload'
      responses:
        '202':
          description: Workflow queued/accepted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneFExternalVacancyResult'
        '400':
          description: Invalid payload

  /vacancies/external/delete:
    post:
      summary: Delete External Vacancy (Triggers Selenium Script)
      description: Launches Python Selenium to delete an external vacancy.
      tags:
        - Vacancies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneFExternalVacancyDeletePayload'
      responses:
        '202':
          description: Workflow queued/accepted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneFExternalVacancyResult'
        '400':
          description: Invalid payload

  /vacancies/description:
    post:
      summary: Generate AI Vacancy Description
      description: Uses OpenAI to generate a professional vacancy description based on provided parameters (title, company, location, skills, etc.).
      tags:
        - Vacancies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneFGenerateDescriptionPayload'
      responses:
        '200':
          description: AI-generated description
          content:
            application/json:
              schema:
                type: object
                properties:
                  description:
                    type: string
        '400':
          description: Invalid payload

  /dictionaries/candidate-statuses:
    get:
      summary: Dictionary of Candidate Statuses
      tags:
        - Dictionaries
      responses:
        '200':
          description: Key-value pair options for dropdowns.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    label:
                      type: string

  /dictionaries/test-statuses:
    get:
      summary: Dictionary of Test Statuses
      tags:
        - Dictionaries
      responses:
        '200':
          description: Key-value pair options for dropdowns.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    label:
                      type: string

  # OneF Endpoint that Recruitment Platform calls
  /action/postTestStatus:
    post:
      summary: "[Webhook] OneF Test Status Receiver"
      description: "Recruitment Platform calls this endpoint on OneF side whenever a test attempt is started or completed."
      tags:
        - Webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestBody:
                   $ref: '#/components/schemas/OneFTestStatusPayload'
      responses:
        '200':
          description: OK

  /action/receivemessage:
    post:
      summary: "[Webhook] OneF Inbound Message Receiver"
      description: "Recruitment Platform calls this when a candidate sends a message via Telegram. These messages appear in the OneF chat."
      tags:
        - Webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestBody:
                   type: object
                   properties:
                     event_type:
                       type: string
                       example: "new_message"
                     candidate_id:
                       type: string
                       format: uuid
                     vacancy_id:
                       type: integer
                       description: "Specific vacancy ID this message belongs to"
                     telegram_id:
                       type: integer
                     text:
                       type: string
                     received_at:
                       type: string
                       format: date-time
      responses:
        '200':
          description: OK

  /action/candidateResponse:
    post:
      summary: "[Webhook] OneF Candidate Event Receiver"
      description: "Recruitment Platform calls this for various candidate events like application, status changes, and AI grade sharing."
      tags:
        - Webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestBody:
                  oneOf:
                    - $ref: '#/components/schemas/OneFNewApplicationEvent'
                    - $ref: '#/components/schemas/OneFGradeSharedEvent'
                    - $ref: '#/components/schemas/OneFCandidateStatusChangedEvent'
      responses:
        '200':
          description: OK

components:
  schemas:
    OneFDashboardStats:
      type: object
      properties:
        candidates_total:
          type: integer
        candidates_new_today:
          type: integer
        active_vacancies:
          type: integer
        test_attempts_pending:
          type: integer
        recruitment_funnel:
          $ref: '#/components/schemas/RecruitmentFunnel'

    RecruitmentFunnel:
      type: object
      properties:
        registered:
          type: integer
        applied:
          type: integer
        test_started:
          type: integer
        test_completed:
          type: integer
        hired:
          type: integer

    OneFCandidateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        telegram_id:
          type: integer
          nullable: true
        name:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        cv_url:
          type: string
          nullable: true
        status:
          type: string
        ai_rating:
          type: integer
          nullable: true
        ai_comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true

    OneFChatMessage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [inbound, outbound]
        text:
          type: string
        created_at:
          type: string
          format: date-time
        is_read:
          type: boolean

    OneFTestSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        test_type:
          type: string
        duration_minutes:
          type: integer
        passing_score:
          type: number
          format: float
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          nullable: true

    OneFSendMessageRequest:
      type: object
      required:
        - candidate_id
        - text
      properties:
        candidate_id:
          type: string
          format: uuid
        text:
          type: string

    OneFUpdateStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    OneFCreateInviteRequest:
      type: object
      required:
        - candidate_id
        - test_id
      properties:
        candidate_id:
          type: string
          format: uuid
        test_id:
          type: string
          format: uuid
        expires_in_hours:
          type: integer
          description: Expiration time in hours. Defaults to 48 for tests, or calculated for presentations if duration is set.
          default: 48
        vacancy_id:
          type: integer
          nullable: true
          description: Optional vacancy ID. Useful for associating this test attempt with a specific application.



    OneFVacancyResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        company:
          type: string
        location:
          type: string
        status:
          type: string
        source:
          type: string
        created_at:
          type: string
          format: date-time

    OneFExternalVacancyPayload:
      type: object
      required:
        - email
        - password
        - title
        - content
      properties:
        email:
          type: string
        password:
          type: string
        title:
          type: string
        content:
          type: string
        city:
          type: string
          nullable: true
        direction:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        hot:
          type: boolean
          default: false
        driver_binary:
          type: string
          nullable: true

    OneFExternalVacancyDeletePayload:
      type: object
      required:
        - email
        - password
        - vacancy_id
      properties:
        email:
          type: string
        password:
          type: string
        vacancy_id:
          type: string
        driver_binary:
          type: string
          nullable: true

    OneFExternalVacancyResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        vacancy_id:
          type: string
          nullable: true
        stdout:
          type: string
          nullable: true
        stderr:
          type: string
          nullable: true

    OneFGenerateDescriptionPayload:
      type: object
      required:
        - title
        - company
        - location
      properties:
        title:
          type: string
        company:
          type: string
        location:
          type: string
        language:
          type: string
          nullable: true
        age:
          type: string
          nullable: true
        education:
          type: string
          nullable: true
        working_experience:
          type: string
          nullable: true
        professional_skills:
          type: string
          nullable: true
        computer_knowledge:
          type: string
          nullable: true
        personal_qualities:
          type: string
          nullable: true
        schedule:
          type: string
          nullable: true

    OneFTestStatusPayload:
      type: object
      required:
        - candidate_id
        - test_id
        - test_status
        - event_date
        - event_data
      properties:
        candidate_id:
          type: string
          format: uuid
        test_id:
          type: string
          format: uuid
        vacancy_id:
          type: integer
        test_status:
          type: string
          enum: [in_progress, completed, passed, failed, needs_review]
        event_date:
          type: string
          format: date-time
        event_data:
          $ref: '#/components/schemas/OneFTestStatusEventData'

    OneFTestStatusEventData:
      type: object
      properties:
        attempt_id:
          type: string
          format: uuid
          nullable: true
        user_score:
          type: number
          nullable: true
        max_score:
          type: number
          nullable: true
        percentage:
          type: number
          nullable: true
        passed:
          type: boolean
          nullable: true
        result_url:
          type: string
          nullable: true
          description: "Combined legacy results string"
        presentation_link:
          type: string
          nullable: true
          description: "Direct URL to user-provided presentation link"
        presentation_file_url:
          type: string
          nullable: true
          description: "Absolute URL to the uploaded presentation file on the recruitment platform"

    OneFNewApplicationEvent:
      type: object
      required:
        - event_type
        - vacancy_id
        - vacancy_name
        - candidate
        - applied_at
      properties:
        event_type:
          type: string
          example: "new_application"
        vacancy_id:
          type: integer
        vacancy_name:
          type: string
        candidate:
          type: object
          properties:
            id:
              type: string
              format: uuid
            telegram_id:
              type: integer
            fullname:
              type: string
            name:
              type: string
            surname:
              type: string
            email:
              type: string
            phone:
              type: string
            dob:
              type: string
            cv_url:
              type: string
            ai_rating:
              type: integer
            ai_comment:
              type: string
        applied_at:
          type: string
          format: date-time

    OneFGradeSharedEvent:
      type: object
      required:
        - event_type
        - candidate_id
        - vacancy_id
        - grade
        - shared_at
      properties:
        event_type:
          type: string
          example: "grade_shared"
        candidate_id:
          type: string
          format: uuid
        vacancy_id:
          type: integer
        grade:
          type: integer
        shared_at:
          type: string
          format: date-time

    OneFCandidateStatusChangedEvent:
      type: object
      required:
        - event_type
        - candidate_id
        - vacancy_id
        - status
        - updated_at
      properties:
        event_type:
          type: string
          example: "candidate_status_changed"
        candidate_id:
          type: string
          format: uuid
        vacancy_id:
          type: integer
        status:
          type: string
        updated_at:
          type: string
          format: date-time
